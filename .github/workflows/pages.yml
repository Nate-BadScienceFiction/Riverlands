# Deploy the prototype as a static site to GitHub Pages.
# The configure-pages step below auto-enables Pages on first run, so
# no Settings → Pages dance is needed. Published URL:
#   https://nate-badsciencefiction.github.io/Riverlands/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload prototype as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Only the prototype directory becomes the site.
          path: experiment1/prototype

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
